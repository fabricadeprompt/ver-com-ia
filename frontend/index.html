<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ver com IA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #080c10;
    --surface: #0f1419;
    --surface2: #161d25;
    --border: #1e2a36;
    --accent: #38e8a0;
    --accent-glow: rgba(56,232,160,0.15);
    --accent-dim: #0f3324;
    --amber: #f5a623;
    --red: #f54b4b;
    --purple: #a78bfa;
    --text: #dde8f0;
    --text-mid: #8a9bb0;
    --text-dim: #4a5a6a;
    --radius-lg: 24px;
    --radius-md: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Atkinson Hyperlegible', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    position: relative;
  }

  /* CÂMERA */
  #camera-wrap {
    position: relative;
    flex: 1;
    background: #000;
    overflow: hidden;
  }

  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.9;
  }

  #canvas { display: none; }

  #camera-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(8,12,16,0.7) 100%);
    pointer-events: none;
  }

  /* Indicador de estado */
  #state-indicator {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    pointer-events: none;
  }

  #state-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(8,12,16,0.85);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-mid);
    backdrop-filter: blur(8px);
    transition: all 0.4s ease;
  }

  #state-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.4s ease;
    flex-shrink: 0;
  }

  #flash {
    position: absolute;
    inset: 0; z-index: 10;
    background: white;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.08s;
  }
  #flash.on { opacity: 0.5; }

  /* Ondas de escuta */
  #listen-wave, #speak-wave {
    position: absolute;
    bottom: 20px;
    left: 50%; transform: translateX(-50%);
    z-index: 5;
    display: none;
    align-items: flex-end;
    gap: 3px;
    height: 36px;
  }
  #listen-wave.active, #speak-wave.active { display: flex; }

  .lw-bar {
    width: 3px; background: var(--accent);
    border-radius: 3px;
    animation: lwave 0.7s ease-in-out infinite alternate;
    opacity: 0.8;
  }
  .sw-bar {
    width: 3px; background: var(--purple);
    border-radius: 3px;
    animation: lwave 0.9s ease-in-out infinite alternate;
    opacity: 0.8;
  }
  .lw-bar:nth-child(1), .sw-bar:nth-child(1) { height: 8px;  animation-delay: 0.00s; }
  .lw-bar:nth-child(2), .sw-bar:nth-child(2) { height: 20px; animation-delay: 0.10s; }
  .lw-bar:nth-child(3), .sw-bar:nth-child(3) { height: 30px; animation-delay: 0.05s; }
  .lw-bar:nth-child(4), .sw-bar:nth-child(4) { height: 36px; animation-delay: 0.15s; }
  .lw-bar:nth-child(5), .sw-bar:nth-child(5) { height: 28px; animation-delay: 0.00s; }
  .lw-bar:nth-child(6), .sw-bar:nth-child(6) { height: 18px; animation-delay: 0.10s; }
  .lw-bar:nth-child(7), .sw-bar:nth-child(7) { height: 8px;  animation-delay: 0.05s; }
  @keyframes lwave {
    from { transform: scaleY(0.3); }
    to   { transform: scaleY(1);   }
  }

  /* PAINEL INFERIOR */
  #bottom {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px 32px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  #msg-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    min-height: 80px;
    max-height: 140px;
    overflow-y: auto;
    font-size: 16px;
    line-height: 1.6;
    color: var(--text);
    transition: border-color 0.3s;
  }
  #msg-box.listening { border-color: var(--accent); }
  #msg-box.thinking  { border-color: var(--amber);  }
  #msg-box.speaking  { border-color: var(--purple); }

  .msg-placeholder { color: var(--text-dim); font-size: 14px; }
  .msg-user  { color: var(--accent); font-size: 13px; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .msg-reply { color: var(--text); font-size: 16px; line-height: 1.6; }

  #btn-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
  }

  #btn-mic {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius-lg);
    height: 72px;
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-weight: 700;
    font-size: 17px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.15s;
  }
  #btn-mic.listening {
    background: var(--red);
    animation: mic-pulse 1.2s ease-in-out infinite;
  }
  #btn-mic:disabled {
    background: var(--accent-dim);
    color: var(--text-dim);
    cursor: not-allowed;
  }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245,75,75,0.4); }
    50%       { box-shadow: 0 0 0 12px rgba(245,75,75,0); }
  }

  #btn-repeat {
    width: 72px; height: 72px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    color: var(--text-mid);
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #btn-repeat:active { border-color: var(--purple); color: var(--purple); }
  #btn-repeat:disabled { opacity: 0.3; cursor: not-allowed; }

  .hint {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }

  /* TELA DE BOAS-VINDAS */
  #welcome-screen {
    position: absolute;
    inset: 0; z-index: 20;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    text-align: center;
  }

  .welcome-logo {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 28px;
    box-shadow: 0 0 40px var(--accent-glow);
    animation: logo-breathe 3s ease-in-out infinite;
  }
  @keyframes logo-breathe {
    0%, 100% { box-shadow: 0 0 30px var(--accent-glow); }
    50%       { box-shadow: 0 0 60px rgba(56,232,160,0.3); }
  }

  .welcome-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .welcome-sub {
    font-size: 15px;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 40px;
    max-width: 300px;
  }

  #btn-start {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius-lg);
    padding: 20px;
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-weight: 700;
    font-size: 18px;
    cursor: pointer;
    margin-bottom: 12px;
  }
  #btn-start:active { transform: scale(0.97); }

  .welcome-note {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }

  #msg-box::-webkit-scrollbar { width: 3px; }
  #msg-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

  <div id="welcome-screen">
    <div class="welcome-logo">👁</div>
    <h1 class="welcome-title">Ver com IA</h1>
    <p class="welcome-sub">Assistente de descrição visual por voz. Aponte a câmera e pergunte o que quiser.</p>
    <button id="btn-start" onclick="iniciar()">Iniciar</button>
    <span class="welcome-note">requer câmera e microfone</span>
  </div>

  <div id="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="state-indicator">
      <div id="state-pill">
        <div id="state-dot"></div>
        <span id="state-label">aguardando</span>
      </div>
    </div>

    <div id="listen-wave">
      <div class="lw-bar"></div><div class="lw-bar"></div>
      <div class="lw-bar"></div><div class="lw-bar"></div>
      <div class="lw-bar"></div><div class="lw-bar"></div>
      <div class="lw-bar"></div>
    </div>

    <div id="speak-wave">
      <div class="sw-bar"></div><div class="sw-bar"></div>
      <div class="sw-bar"></div><div class="sw-bar"></div>
      <div class="sw-bar"></div><div class="sw-bar"></div>
      <div class="sw-bar"></div>
    </div>

    <div id="flash"></div>
  </div>

  <div id="bottom">
    <div id="msg-box" role="status" aria-live="polite">
      <span class="msg-placeholder">O assistente está pronto. Toque no microfone e fale seu pedido.</span>
    </div>

    <div id="btn-row">
      <button id="btn-mic" onclick="toggleMic()">
        <span id="mic-icon">🎙</span>
        <span id="mic-label">Falar</span>
      </button>
      <button id="btn-repeat" onclick="repetir()" disabled>🔁</button>
    </div>

    <p class="hint">toque em FALAR · diga seu pedido · aguarde a resposta</p>
  </div>

</div>

<script>
  // ⚠️ Aponte para o backend no Render após o deploy
  const BACKEND_URL = 'http://127.0.0.1:8000';

  const STATE = { IDLE: 'idle', LISTENING: 'listening', THINKING: 'thinking', SPEAKING: 'speaking' };
  let currentState = STATE.IDLE;
  let lastReply = '';
  let recognition = null;

  const video      = document.getElementById('video');
  const canvas     = document.getElementById('canvas');
  const msgBox     = document.getElementById('msg-box');
  const btnMic     = document.getElementById('btn-mic');
  const btnRepeat  = document.getElementById('btn-repeat');
  const micIcon    = document.getElementById('mic-icon');
  const micLabel   = document.getElementById('mic-label');
  const stateDot   = document.getElementById('state-dot');
  const stateLabel = document.getElementById('state-label');
  const listenWave = document.getElementById('listen-wave');
  const speakWave  = document.getElementById('speak-wave');
  const flash      = document.getElementById('flash');

  async function iniciar() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      document.getElementById('welcome-screen').style.display = 'none';

      const saudacao = getSaudacao();
      await falar(`${saudacao}! Como posso te ajudar?`);
      setMsg('', `${saudacao}! Como posso te ajudar?`);
      setState(STATE.IDLE);
    } catch (err) {
      alert('Não foi possível acessar câmera ou microfone. Verifique as permissões.');
    }
  }

  function getSaudacao() {
    const h = new Date().getHours();
    if (h >= 5  && h < 12) return 'Bom dia';
    if (h >= 12 && h < 18) return 'Boa tarde';
    return 'Boa noite';
  }

  function toggleMic() {
    if (currentState === STATE.LISTENING) pararEscuta();
    else if (currentState === STATE.IDLE) iniciarEscuta();
  }

  function iniciarEscuta() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { falar('Reconhecimento de voz não disponível. Use o Chrome.'); return; }

    recognition = new SR();
    recognition.lang = 'pt-BR';
    recognition.continuous = false;
    recognition.interimResults = false;

    setState(STATE.LISTENING);
    setMsg('', 'Ouvindo...');

    recognition.onresult = async (e) => {
      const pedido = e.results[0][0].transcript.trim();
      await processarPedido(pedido);
    };

    recognition.onerror = (e) => {
      setState(STATE.IDLE);
      setMsg('', e.error === 'no-speech' ? 'Não ouvi nada. Tente novamente.' : 'Erro no microfone. Tente novamente.');
    };

    recognition.onend = () => {
      if (currentState === STATE.LISTENING) setState(STATE.IDLE);
    };

    recognition.start();
  }

  function pararEscuta() {
    if (recognition) { recognition.stop(); recognition = null; }
    setState(STATE.IDLE);
  }

  async function processarPedido(pedido) {
    setState(STATE.THINKING);
    setMsg(pedido, 'Analisando...');

    flash.classList.add('on');
    setTimeout(() => flash.classList.remove('on'), 120);
    if (navigator.vibrate) navigator.vibrate(60);

    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const imgBase64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

    try {
      const res = await fetch(`${BACKEND_URL}/descrever`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pedido, imagem_base64: imgBase64 })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      lastReply = data.descricao;

      setMsg(pedido, lastReply);
      setState(STATE.SPEAKING);
      await falar(lastReply);
      setState(STATE.IDLE);
      btnRepeat.disabled = false;

    } catch (err) {
      const errMsg = 'Não consegui analisar. Tente novamente.';
      setMsg(pedido, errMsg);
      await falar(errMsg);
      setState(STATE.IDLE);
      console.error(err);
    }
  }

  function falar(texto) {
    return new Promise((resolve) => {
      const synth = window.speechSynthesis;
      if (synth.speaking) synth.cancel();
      speakWave.classList.add('active');

      const utt = new SpeechSynthesisUtterance(texto);
      utt.lang = 'pt-BR'; utt.rate = 0.95; utt.pitch = 1.0; utt.volume = 1.0;

      const voices = synth.getVoices();
      const ptVoice = voices.find(v => v.lang.startsWith('pt') && v.localService)
                   || voices.find(v => v.lang.startsWith('pt'));
      if (ptVoice) utt.voice = ptVoice;

      utt.onend   = () => { speakWave.classList.remove('active'); resolve(); };
      utt.onerror = () => { speakWave.classList.remove('active'); resolve(); };
      synth.speak(utt);

      const duracao = Math.max(texto.length * 65, 1500);
      setTimeout(() => { speakWave.classList.remove('active'); resolve(); }, duracao + 500);
    });
  }

  function repetir() {
    if (!lastReply || currentState !== STATE.IDLE) return;
    if (navigator.vibrate) navigator.vibrate(40);
    setState(STATE.SPEAKING);
    falar(lastReply).then(() => setState(STATE.IDLE));
  }

  function setState(state) {
    currentState = state;
    listenWave.classList.remove('active');
    speakWave.classList.remove('active');
    btnMic.classList.remove('listening');
    btnMic.disabled = false;

    const cores = { idle: 'var(--accent)', listening: 'var(--red)', thinking: 'var(--amber)', speaking: 'var(--purple)' };
    const labels = { idle: 'pronto', listening: 'ouvindo', thinking: 'analisando', speaking: 'falando' };
    stateDot.style.background = cores[state];
    stateDot.style.boxShadow  = `0 0 8px ${cores[state]}`;
    stateLabel.textContent    = labels[state];

    if (state === STATE.LISTENING) { btnMic.classList.add('listening'); listenWave.classList.add('active'); micIcon.textContent = '⏹'; micLabel.textContent = 'Parar'; }
    if (state === STATE.THINKING)  { btnMic.disabled = true; micIcon.textContent = '⏳'; micLabel.textContent = 'Aguarde'; }
    if (state === STATE.SPEAKING)  { btnMic.disabled = true; speakWave.classList.add('active'); micIcon.textContent = '🔊'; micLabel.textContent = 'Falando'; }
    if (state === STATE.IDLE)      { micIcon.textContent = '🎙'; micLabel.textContent = 'Falar'; }
  }

  function setMsg(pedido, resposta) {
    msgBox.innerHTML = pedido
      ? `<div class="msg-user">▸ ${pedido}</div><div class="msg-reply">${resposta}</div>`
      : `<span class="msg-reply">${resposta}</span>`;
    msgBox.scrollTop = msgBox.scrollHeight;
    msgBox.className = '';
    if (currentState === STATE.LISTENING) msgBox.classList.add('listening');
    if (currentState === STATE.THINKING)  msgBox.classList.add('thinking');
    if (currentState === STATE.SPEAKING)  msgBox.classList.add('speaking');
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); if (currentState === STATE.IDLE || currentState === STATE.LISTENING) toggleMic(); }
    if (e.code === 'KeyR' && currentState === STATE.IDLE) repetir();
  });

  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>
</body>
</html>
