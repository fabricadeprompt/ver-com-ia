<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ver com IA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #080c10;
    --surface: #0f1419;
    --surface2: #161d25;
    --border: #1e2a36;
    --accent: #38e8a0;
    --accent-glow: rgba(56,232,160,0.15);
    --accent-dim: #0f3324;
    --amber: #f5a623;
    --amber-glow: rgba(245,166,35,0.15);
    --red: #f54b4b;
    --purple: #a78bfa;
    --purple-glow: rgba(167,139,250,0.15);
    --text: #dde8f0;
    --text-mid: #8a9bb0;
    --text-dim: #4a5a6a;
    --radius-lg: 24px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Atkinson Hyperlegible', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ===================== LAYOUT ===================== */
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    position: relative;
  }

  /* ===================== CÂMERA ===================== */
  #camera-wrap {
    position: relative;
    flex: 1;
    background: #000;
    overflow: hidden;
  }

  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.9;
  }

  #canvas { display: none; }

  /* Vinheta nas bordas */
  #camera-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(8,12,16,0.7) 100%);
    pointer-events: none;
  }

  /* Indicador de estado no topo da câmera */
  #state-indicator {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    pointer-events: none;
  }

  #state-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(8,12,16,0.85);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-mid);
    backdrop-filter: blur(8px);
    transition: all 0.4s ease;
  }

  #state-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.4s ease;
    flex-shrink: 0;
  }

  /* Flash de captura */
  #flash {
    position: absolute;
    inset: 0; z-index: 10;
    background: white;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.08s;
  }
  #flash.on { opacity: 0.5; }

  /* Animação de escuta — ondas */
  #listen-wave {
    position: absolute;
    bottom: 20px;
    left: 50%; transform: translateX(-50%);
    z-index: 5;
    display: none;
    align-items: flex-end;
    gap: 3px;
    height: 36px;
  }
  #listen-wave.active { display: flex; }
  .lw-bar {
    width: 3px;
    background: var(--accent);
    border-radius: 3px;
    animation: lwave 0.7s ease-in-out infinite alternate;
    opacity: 0.8;
  }
  .lw-bar:nth-child(1) { height: 8px;  animation-delay: 0.0s; }
  .lw-bar:nth-child(2) { height: 20px; animation-delay: 0.1s; }
  .lw-bar:nth-child(3) { height: 30px; animation-delay: 0.05s;}
  .lw-bar:nth-child(4) { height: 36px; animation-delay: 0.15s;}
  .lw-bar:nth-child(5) { height: 28px; animation-delay: 0.0s; }
  .lw-bar:nth-child(6) { height: 18px; animation-delay: 0.1s; }
  .lw-bar:nth-child(7) { height: 8px;  animation-delay: 0.05s;}
  @keyframes lwave {
    from { transform: scaleY(0.3); }
    to   { transform: scaleY(1);   }
  }

  /* Animação de fala — ondas roxas */
  #speak-wave {
    position: absolute;
    bottom: 20px;
    left: 50%; transform: translateX(-50%);
    z-index: 5;
    display: none;
    align-items: flex-end;
    gap: 3px;
    height: 36px;
  }
  #speak-wave.active { display: flex; }
  .sw-bar {
    width: 3px;
    background: var(--purple);
    border-radius: 3px;
    animation: lwave 0.9s ease-in-out infinite alternate;
    opacity: 0.8;
  }
  .sw-bar:nth-child(1) { height: 10px; animation-delay: 0.0s; }
  .sw-bar:nth-child(2) { height: 24px; animation-delay: 0.12s;}
  .sw-bar:nth-child(3) { height: 32px; animation-delay: 0.06s;}
  .sw-bar:nth-child(4) { height: 36px; animation-delay: 0.18s;}
  .sw-bar:nth-child(5) { height: 26px; animation-delay: 0.03s;}
  .sw-bar:nth-child(6) { height: 16px; animation-delay: 0.09s;}
  .sw-bar:nth-child(7) { height: 8px;  animation-delay: 0.0s; }

  /* ===================== PAINEL INFERIOR ===================== */
  #bottom {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px 32px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* Caixa de texto */
  #msg-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    min-height: 80px;
    max-height: 140px;
    overflow-y: auto;
    font-size: 16px;
    line-height: 1.6;
    color: var(--text);
    transition: border-color 0.3s;
    scroll-behavior: smooth;
  }
  #msg-box.listening { border-color: var(--accent); }
  #msg-box.thinking  { border-color: var(--amber);  }
  #msg-box.speaking  { border-color: var(--purple);  }

  .msg-placeholder { color: var(--text-dim); font-size: 14px; }
  .msg-user  { color: var(--accent); font-size: 13px; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .msg-reply { color: var(--text); font-size: 16px; line-height: 1.6; }

  /* Botões */
  #btn-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
  }

  #btn-mic {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius-lg);
    height: 72px;
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-weight: 700;
    font-size: 17px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  #btn-mic::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }
  #btn-mic:active::before { background: rgba(255,255,255,0.15); }
  #btn-mic.listening {
    background: var(--red);
    animation: mic-pulse 1.2s ease-in-out infinite;
  }
  #btn-mic:disabled {
    background: var(--accent-dim);
    color: var(--text-dim);
    cursor: not-allowed;
  }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245,75,75,0.4); }
    50%       { box-shadow: 0 0 0 12px rgba(245,75,75,0); }
  }

  #btn-repeat {
    width: 72px; height: 72px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    color: var(--text-mid);
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #btn-repeat:active { border-color: var(--purple); color: var(--purple); transform: scale(0.94); }
  #btn-repeat:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Dica */
  .hint {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }

  /* ===================== TELA DE BOAS-VINDAS ===================== */
  #welcome-screen {
    position: absolute;
    inset: 0; z-index: 20;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    text-align: center;
    gap: 0;
  }

  .welcome-logo {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 28px;
    box-shadow: 0 0 40px var(--accent-glow);
    animation: logo-breathe 3s ease-in-out infinite;
  }
  @keyframes logo-breathe {
    0%, 100% { box-shadow: 0 0 30px var(--accent-glow); }
    50%       { box-shadow: 0 0 60px rgba(56,232,160,0.3); }
  }

  .welcome-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.2;
  }

  .welcome-sub {
    font-size: 15px;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 40px;
    max-width: 300px;
  }

  #btn-start {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius-lg);
    padding: 20px;
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-weight: 700;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 12px;
  }
  #btn-start:active { transform: scale(0.97); }

  .welcome-note {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }

  /* scrollbar discreta */
  #msg-box::-webkit-scrollbar { width: 3px; }
  #msg-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

  <!-- TELA DE BOAS-VINDAS -->
  <div id="welcome-screen" role="main" aria-label="Tela inicial">
    <div class="welcome-logo" aria-hidden="true">👁</div>
    <h1 class="welcome-title">Ver com IA</h1>
    <p class="welcome-sub">Assistente de descrição visual por voz. Aponte a câmera e pergunte o que quiser.</p>
    <button id="btn-start" onclick="iniciar()" aria-label="Iniciar o assistente">
      Iniciar
    </button>
    <span class="welcome-note">requer câmera e microfone</span>
  </div>

  <!-- CÂMERA -->
  <div id="camera-wrap" aria-hidden="true">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="state-indicator">
      <div id="state-pill">
        <div id="state-dot"></div>
        <span id="state-label">aguardando</span>
      </div>
    </div>

    <div id="listen-wave" aria-hidden="true">
      <div class="lw-bar"></div><div class="lw-bar"></div>
      <div class="lw-bar"></div><div class="lw-bar"></div>
      <div class="lw-bar"></div><div class="lw-bar"></div>
      <div class="lw-bar"></div>
    </div>

    <div id="speak-wave" aria-hidden="true">
      <div class="sw-bar"></div><div class="sw-bar"></div>
      <div class="sw-bar"></div><div class="sw-bar"></div>
      <div class="sw-bar"></div><div class="sw-bar"></div>
      <div class="sw-bar"></div>
    </div>

    <div id="flash" aria-hidden="true"></div>
  </div>

  <!-- PAINEL INFERIOR -->
  <div id="bottom">
    <div id="msg-box" role="status" aria-live="polite" aria-label="Mensagens do assistente">
      <span class="msg-placeholder">O assistente está pronto. Toque no microfone e fale seu pedido.</span>
    </div>

    <div id="btn-row">
      <button id="btn-mic" onclick="toggleMic()" aria-label="Falar com o assistente">
        <span id="mic-icon">🎙</span>
        <span id="mic-label">Falar</span>
      </button>
      <button id="btn-repeat" onclick="repetir()" disabled aria-label="Repetir última resposta">
        🔁
      </button>
    </div>

    <p class="hint" aria-hidden="true">toque em FALAR · diga seu pedido · aguarde a resposta</p>
  </div>

</div>

<script>
// ============================================================
// ESTADO GLOBAL
// ============================================================
const STATE = {
  IDLE:      'idle',
  LISTENING: 'listening',
  THINKING:  'thinking',
  SPEAKING:  'speaking',
};

let currentState = STATE.IDLE;
let lastReply = '';
let recognition = null;
let stream = null;
let isFirstInteraction = true;

// ============================================================
// ELEMENTOS
// ============================================================
const video       = document.getElementById('video');
const canvas      = document.getElementById('canvas');
const msgBox      = document.getElementById('msg-box');
const btnMic      = document.getElementById('btn-mic');
const btnRepeat   = document.getElementById('btn-repeat');
const micIcon     = document.getElementById('mic-icon');
const micLabel    = document.getElementById('mic-label');
const stateDot    = document.getElementById('state-dot');
const stateLabel  = document.getElementById('state-label');
const listenWave  = document.getElementById('listen-wave');
const speakWave   = document.getElementById('speak-wave');
const flash       = document.getElementById('flash');

// ============================================================
// INICIAR
// ============================================================
async function iniciar() {
  try {
    // Câmera
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;

    // Esconder tela de boas-vindas
    document.getElementById('welcome-screen').style.display = 'none';

    // Saudação inicial
    const saudacao = getSaudacao();
    await falar(`${saudacao}! Como posso te ajudar?`);
    setMsg('', `${saudacao}! Como posso te ajudar?`);
    setState(STATE.IDLE);

    isFirstInteraction = false;

  } catch (err) {
    alert('Não foi possível acessar câmera ou microfone. Verifique as permissões.');
    console.error(err);
  }
}

// ============================================================
// SAUDAÇÃO CONTEXTUAL
// ============================================================
function getSaudacao() {
  const h = new Date().getHours();
  if (h >= 5  && h < 12) return 'Bom dia';
  if (h >= 12 && h < 18) return 'Boa tarde';
  return 'Boa noite';
}

// ============================================================
// RECONHECIMENTO DE VOZ
// ============================================================
function toggleMic() {
  if (currentState === STATE.LISTENING) {
    pararEscuta();
  } else if (currentState === STATE.IDLE) {
    iniciarEscuta();
  }
}

function iniciarEscuta() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    falar('Reconhecimento de voz não disponível neste navegador. Use o Chrome.');
    return;
  }

  recognition = new SR();
  recognition.lang = 'pt-BR';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  setState(STATE.LISTENING);
  setMsg('', 'Ouvindo...');

  recognition.onresult = async (e) => {
    const pedido = e.results[0][0].transcript.trim();
    await processarPedido(pedido);
  };

  recognition.onerror = (e) => {
    console.error('Erro de reconhecimento:', e.error);
    if (e.error === 'no-speech') {
      setState(STATE.IDLE);
      setMsg('', 'Não ouvi nada. Tente novamente.');
    } else {
      setState(STATE.IDLE);
      setMsg('', 'Erro no reconhecimento de voz. Tente novamente.');
    }
  };

  recognition.onend = () => {
    if (currentState === STATE.LISTENING) setState(STATE.IDLE);
  };

  recognition.start();
}

function pararEscuta() {
  if (recognition) {
    recognition.stop();
    recognition = null;
  }
  setState(STATE.IDLE);
}

// ============================================================
// PROCESSAR PEDIDO
// ============================================================
async function processarPedido(pedido) {
  setState(STATE.THINKING);
  setMsg(pedido, 'Analisando...');

  // Flash e vibração
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 120);
  if (navigator.vibrate) navigator.vibrate(60);

  // Capturar frame
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const imgData = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

  try {
    const resposta = await perguntarClaude(pedido, imgData);
    lastReply = resposta;
    setMsg(pedido, resposta);
    setState(STATE.SPEAKING);
    await falar(resposta);
    setState(STATE.IDLE);
    btnRepeat.disabled = false;
  } catch (err) {
    const errMsg = 'Não consegui analisar. Tente novamente.';
    setMsg(pedido, errMsg);
    await falar(errMsg);
    setState(STATE.IDLE);
    console.error(err);
  }
}

// ============================================================
// API CLAUDE VISION
// ============================================================
async function perguntarClaude(pedido, base64Image) {
  const systemPrompt = `Você é um assistente de descrição visual para pessoas com deficiência visual. 
O usuário vai fazer um pedido em linguagem natural sobre o que a câmera está mostrando.

Regras absolutas:
- Responda APENAS em português do Brasil
- Seja claro, direto e natural — como alguém descrevendo verbalmente para um amigo
- SEM markdown, asteriscos, listas, emojis ou qualquer formatação
- Máximo 4 frases por resposta
- Adapte sua descrição ao pedido do usuário:
  * "o que é isso" → descreva o objeto principal: tipo, cor, forma, tamanho aproximado
  * "o que tem no ambiente" ou "onde estou" → descreva o espaço: o que domina a cena, objetos presentes, iluminação
  * "que roupa é essa" → descreva: tipo de peça, cor, estampa, material aparente
  * "leia isso" ou "o que está escrito" → leia o texto visível, palavra por palavra se necessário
  * "que cor é essa" → nomeie as cores com precisão
  * "o que tem dentro" → liste o que é visível
  * Qualquer outro pedido → use bom senso para descrever o que for mais relevante
- Se a imagem estiver escura, borrada ou sem objeto claro, informe de forma gentil
- Nunca diga "não posso ver" — descreva o que está na imagem, mesmo que parcialmente`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 300,
      system: systemPrompt,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'image',
            source: { type: 'base64', media_type: 'image/jpeg', data: base64Image }
          },
          { type: 'text', text: pedido }
        ]
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || 'Erro na API');
  }

  const data = await response.json();
  return data.content[0].text.trim();
}

// ============================================================
// SÍNTESE DE VOZ
// ============================================================
function falar(texto) {
  return new Promise((resolve) => {
    const synth = window.speechSynthesis;
    if (synth.speaking) synth.cancel();

    speakWave.classList.add('active');

    const utt = new SpeechSynthesisUtterance(texto);
    utt.lang    = 'pt-BR';
    utt.rate    = 0.95;
    utt.pitch   = 1.0;
    utt.volume  = 1.0;

    // Tentar voz em português
    const voices  = synth.getVoices();
    const ptVoice = voices.find(v => v.lang.startsWith('pt') && v.localService)
                 || voices.find(v => v.lang.startsWith('pt'));
    if (ptVoice) utt.voice = ptVoice;

    utt.onend   = () => { speakWave.classList.remove('active'); resolve(); };
    utt.onerror = () => { speakWave.classList.remove('active'); resolve(); };

    synth.speak(utt);

    // Fallback: alguns navegadores bloqueiam onend
    const duracao = Math.max(texto.length * 65, 1500);
    setTimeout(() => { speakWave.classList.remove('active'); resolve(); }, duracao + 500);
  });
}

function repetir() {
  if (!lastReply || currentState !== STATE.IDLE) return;
  if (navigator.vibrate) navigator.vibrate(40);
  setState(STATE.SPEAKING);
  falar(lastReply).then(() => setState(STATE.IDLE));
}

// ============================================================
// UI
// ============================================================
function setState(state) {
  currentState = state;

  // Limpar tudo
  listenWave.classList.remove('active');
  btnMic.classList.remove('listening');
  btnMic.disabled = false;

  switch (state) {
    case STATE.IDLE:
      setStatePill('var(--accent)', 'pronto');
      micIcon.textContent  = '🎙';
      micLabel.textContent = 'Falar';
      break;

    case STATE.LISTENING:
      setStatePill('var(--red)', 'ouvindo');
      micIcon.textContent  = '⏹';
      micLabel.textContent = 'Parar';
      btnMic.classList.add('listening');
      listenWave.classList.add('active');
      break;

    case STATE.THINKING:
      setStatePill('var(--amber)', 'analisando');
      micIcon.textContent  = '⏳';
      micLabel.textContent = 'Aguarde';
      btnMic.disabled = true;
      break;

    case STATE.SPEAKING:
      setStatePill('var(--purple)', 'falando');
      micIcon.textContent  = '🔊';
      micLabel.textContent = 'Falando';
      btnMic.disabled = true;
      speakWave.classList.add('active');
      break;
  }
}

function setStatePill(color, label) {
  stateDot.style.background  = color;
  stateDot.style.boxShadow   = `0 0 8px ${color}`;
  stateLabel.textContent     = label;
}

function setMsg(pedido, resposta) {
  if (!pedido) {
    msgBox.innerHTML = `<span class="msg-reply">${resposta}</span>`;
  } else {
    msgBox.innerHTML = `
      <div class="msg-user">▸ ${pedido}</div>
      <div class="msg-reply">${resposta}</div>
    `;
  }
  msgBox.scrollTop = msgBox.scrollHeight;

  // Cor da borda conforme estado
  msgBox.classList.remove('listening', 'thinking', 'speaking');
  if (currentState === STATE.LISTENING) msgBox.classList.add('listening');
  if (currentState === STATE.THINKING)  msgBox.classList.add('thinking');
  if (currentState === STATE.SPEAKING)  msgBox.classList.add('speaking');
}

// ============================================================
// ATALHOS DE TECLADO (acessibilidade desktop)
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (currentState === STATE.IDLE || currentState === STATE.LISTENING) toggleMic();
  }
  if (e.code === 'KeyR' && currentState === STATE.IDLE) repetir();
});

// Carregar vozes disponíveis
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>
</body>
</html>
